version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: purchasingorder
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/purchasingorder
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      KLEDO_TOKEN: ${KLEDO_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
      php artisan key:generate --force &&
      php artisan migrate --force &&
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan serve --host=0.0.0.0 --port=8080
      "
    volumes:
      - .:/app
      - /app/vendor
      - /app/bootstrap/cache
      - /app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/orders?limit=1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
