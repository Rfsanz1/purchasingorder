version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: purchasingorder
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/purchasingorder
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: stderr
      KLEDO_TOKEN: ${KLEDO_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
      mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache bootstrap/cache && chmod -R 775 storage bootstrap/cache &&
      php artisan key:generate --force &&
      php artisan migrate --force &&
      php artisan config:cache &&
      php artisan serve --host=0.0.0.0 --port=8080
      "
    volumes:
      - .:/app
      - /app/vendor
      - /app/bootstrap/cache
      - /app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/orders?limit=1"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  pos-backend:
    build:
      context: ./modules/pos-repo/pos-backend
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "3001:3001"
    environment:
      - MONGO_URL=mongodb://mongo:27017/pos_system
    depends_on:
      - mongo
    volumes:
      - ./modules/pos-repo/pos-backend:/app
    command: ["sh","-c","npm install && npm run start"]
    restart: unless-stopped

  pos-frontend:
    build:
      context: ./modules/pos-repo/pos-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:5173"
    working_dir: /app
    environment:
      - VITE_DEV_SERVER_PORT=5173
      - VITE_API_URL=http://pos-backend:3001
    depends_on:
      - pos-backend
    volumes:
      - ./modules/pos-repo/pos-frontend:/app
    command: ["sh","-c","npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
